<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KZLEAP — Reset Password</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hidden { display: none; }
    .lang-switcher{display:flex;gap:4px;align-items:center;margin-right:8px;}
    .lang-btn{padding:3px 8px;font-size:11px;font-weight:600;border:1px solid #d0d7e2;border-radius:4px;background:#7b98b4;color:#4a5568;cursor:pointer;transition:all 0.15s;}
    .lang-btn:hover{background:#f0f4f8;color:#1a2b4a;}
    .lang-btn.active{background:#1a2b4a;color:#fff;border-color:#1a2b4a;}
  </style>
</head>
<body class="login-page">

  <div style="position:fixed;top:12px;right:16px;z-index:100;" class="lang-switcher">
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" data-lang="kk" onclick="setLang('kk')">KK</button>
  </div>

  <div class="login-container">
    <div class="login-logo">
      
      <h1 class="logo-title">KZLEAP</h1>
      <p class="logo-sub" data-i18n="login_platform_sub">Kazakhstan Energy Forecasting Platform</p>
    </div>

    <div class="login-card" id="step-email">
      <h2 class="login-title" data-i18n="fp_title">Forgot Password</h2>
      <p class="login-sub" data-i18n="fp_sub">Enter your email to receive a reset code</p>
      <div class="form-group">
        <label data-i18n="login_email_label">Email</label>
        <input type="email" id="email"
               data-i18n="reg_email_ph" data-i18n-attr="placeholder"
               placeholder="your@email.com">
      </div>
      <div id="error-1" style="display:none;color:#c0392b;font-size:13px;margin-bottom:12px;"></div>
      <button class="login-btn" onclick="sendCode()" data-i18n="fp_send_btn">Send Reset Code</button>
      <div style="text-align:center;margin-top:16px;font-size:13px;color:#666;">
        <a href="index.html" style="color:#0F6E56;font-weight:600;text-decoration:none;" data-i18n="fp_back">← Back to Sign in</a>
      </div>
    </div>

    <div class="login-card hidden" id="step-reset">
      <h2 class="login-title" data-i18n="fp_reset_title">Reset Password</h2>
      <p class="login-sub" id="reset-subtitle" data-i18n="fp_reset_sub">Enter the code sent to your email</p>
      <div class="form-group">
        <label data-i18n="reg_verify_code_label">Verification Code</label>
        <input type="text" id="code" placeholder="000000" maxlength="6"
               style="font-size:24px;text-align:center;letter-spacing:8px;">
      </div>
      <div class="form-group">
        <label data-i18n="fp_new_password">New Password</label>
        <input type="password" id="new-password"
               data-i18n="fp_new_password_ph" data-i18n-attr="placeholder"
               placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label data-i18n="fp_confirm_password">Confirm Password</label>
        <input type="password" id="confirm-password"
               data-i18n="fp_confirm_password_ph" data-i18n-attr="placeholder"
               placeholder="Repeat new password">
      </div>
      <div id="error-2" style="display:none;color:#c0392b;font-size:13px;margin-bottom:12px;"></div>
      <div id="success-2" style="display:none;color:#0F6E56;font-size:13px;margin-bottom:12px;"></div>
      <button class="login-btn" onclick="resetPassword()" data-i18n="fp_reset_btn">Reset Password</button>
    </div>

  </div>

  <script>
    const BACKEND = 'https://kzleap.onrender.com';
    let userEmail = '';

    async function sendCode() {
      const email = document.getElementById('email').value.trim();
      const error = document.getElementById('error-1');
      error.style.display = 'none';

      if (!email) {
        error.textContent = typeof t === 'function' ? t('fp_err_email') : 'Please enter your email.';
        error.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${BACKEND}/api/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.detail || (typeof t === 'function' ? t('fp_err_not_found') : 'Email not found.');
          error.style.display = 'block';
          return;
        }

        userEmail = email;
        document.getElementById('reset-subtitle').textContent =
          (typeof t === 'function' ? t('fp_code_sent_to') : 'Enter the code sent to') + ' ' + email;
        document.getElementById('step-email').classList.add('hidden');
        document.getElementById('step-reset').classList.remove('hidden');

      } catch {
        error.textContent = typeof t === 'function' ? t('reg_err_server') : 'Cannot connect to server.';
        error.style.display = 'block';
      }
    }

    async function resetPassword() {
      const code            = document.getElementById('code').value.trim();
      const newPassword     = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      const error   = document.getElementById('error-2');
      const success = document.getElementById('success-2');

      error.style.display   = 'none';
      success.style.display = 'none';

      if (!code || !newPassword || !confirmPassword) {
        error.textContent = typeof t === 'function' ? t('reg_err_fill_all') : 'Please fill in all fields.';
        error.style.display = 'block';
        return;
      }

      const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
      if (!passwordRegex.test(newPassword)) {
        error.textContent = typeof t === 'function' ? t('reg_err_password') : 'Password must be at least 8 characters, include one uppercase letter, one number, and one special character (!@#$%^&*).';
        error.style.display = 'block';
        return;
      }

      if (newPassword !== confirmPassword) {
        error.textContent = typeof t === 'function' ? t('fp_err_mismatch') : 'Passwords do not match.';
        error.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${BACKEND}/api/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail, code, password: newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.detail || (typeof t === 'function' ? t('reg_err_code') : 'Invalid code.');
          error.style.display = 'block';
          return;
        }

        success.textContent = typeof t === 'function' ? t('fp_success') : '✓ Password reset successfully! Redirecting...';
        success.style.display = 'block';
        setTimeout(() => window.location.href = 'index.html', 2000);

      } catch {
        error.textContent = typeof t === 'function' ? t('reg_err_server') : 'Cannot connect to server.';
        error.style.display = 'block';
      }
    }
  </script>

  <script src="translations.js"></script>
  <script>document.addEventListener('DOMContentLoaded', applyTranslations);</script>
</body>
</html>
