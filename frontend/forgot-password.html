<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KZLEAP — Reset Password</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hidden { display: none; }
  </style>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon">KZ</div>
      <h1 class="logo-title">KZLEAP</h1>
      <p class="logo-sub">Kazakhstan Energy Forecasting Platform</p>
    </div>

    <!-- Step 1: Enter email -->
    <div class="login-card" id="step-email">
      <h2 class="login-title">Forgot Password</h2>
      <p class="login-sub">Enter your email to receive a reset code</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>
      <div id="error-1" style="display:none;color:#c0392b;font-size:13px;margin-bottom:12px;"></div>
      <button class="login-btn" onclick="sendCode()">Send Reset Code</button>
      <div style="text-align:center;margin-top:16px;font-size:13px;color:#666;">
        <a href="index.html" style="color:#0F6E56;font-weight:600;text-decoration:none;">← Back to Sign in</a>
      </div>
    </div>

    <!-- Step 2: Enter code and new password -->
    <div class="login-card hidden" id="step-reset">
      <h2 class="login-title">Reset Password</h2>
      <p class="login-sub" id="reset-subtitle">Enter the code sent to your email</p>
      <div class="form-group">
        <label>Verification Code</label>
        <input type="text" id="code" placeholder="000000" maxlength="6" style="font-size:24px;text-align:center;letter-spacing:8px;">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat new password">
      </div>
      <div id="error-2" style="display:none;color:#c0392b;font-size:13px;margin-bottom:12px;"></div>
      <div id="success-2" style="display:none;color:#0F6E56;font-size:13px;margin-bottom:12px;"></div>
      <button class="login-btn" onclick="resetPassword()">Reset Password</button>
    </div>

  </div>

  <script>
    const BACKEND = 'http://localhost:8000';
    let userEmail = '';

    async function sendCode() {
      const email = document.getElementById('email').value.trim();
      const error = document.getElementById('error-1');
      error.style.display = 'none';

      if (!email) {
        error.textContent = 'Please enter your email.';
        error.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${BACKEND}/api/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.detail || 'Email not found.';
          error.style.display = 'block';
          return;
        }

        userEmail = email;
        document.getElementById('reset-subtitle').textContent = `Enter the code sent to ${email}`;
        document.getElementById('step-email').classList.add('hidden');
        document.getElementById('step-reset').classList.remove('hidden');

      } catch {
        error.textContent = 'Cannot connect to server.';
        error.style.display = 'block';
      }
    }

    async function resetPassword() {
      const code = document.getElementById('code').value.trim();
      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      const error = document.getElementById('error-2');
      const success = document.getElementById('success-2');

      error.style.display = 'none';
      success.style.display = 'none';

      if (!code || !newPassword || !confirmPassword) {
        error.textContent = 'Please fill in all fields.';
        error.style.display = 'block';
        return;
      }

      const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
      if (!passwordRegex.test(newPassword)) {
        error.textContent = 'Password must be at least 8 characters, include one uppercase letter, one number, and one special character (!@#$%^&*).';
        error.style.display = 'block';
        return;
      }

      if (newPassword !== confirmPassword) {
        error.textContent = 'Passwords do not match.';
        error.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${BACKEND}/api/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail, code, password: newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.detail || 'Invalid code.';
          error.style.display = 'block';
          return;
        }

        success.textContent = '✓ Password reset successfully! Redirecting...';
        success.style.display = 'block';
        setTimeout(() => window.location.href = 'index.html', 2000);

      } catch {
        error.textContent = 'Cannot connect to server.';
        error.style.display = 'block';
      }
    }
  </script>
</body>
</html>
