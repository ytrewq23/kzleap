<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KZLEAP — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-logo">
      <div class="logo-circle">KZ</div>
      <h1>KZLEAP</h1>
      <p>Kazakhstan Energy Forecasting Platform</p>
    </div>

    <div class="login-card">
      <h2>Sign in</h2>
      <p class="login-sub">Choose your role and enter credentials</p>

      <div class="role-selector">
        <button class="role-btn active" onclick="selectRole('analyst', this)">
          Energy Analyst
        </button>
        <button class="role-btn" onclick="selectRole('researcher', this)">
          Researcher
        </button>
        <button class="role-btn" onclick="selectRole('policymaker', this)">
          Policymaker
        </button>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@kzleap.kz" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <div id="error-msg" class="error-msg" style="display:none;">
        Invalid email or password. Please try again.
      </div>

      <button class="login-btn" onclick="handleLogin()">Sign in</button>
      <div style="text-align:center;margin-top:12px;font-size:13px;">
  <a href="forgot-password.html" style="color:#0F6E56;text-decoration:none;">Forgot password?</a>
</div>
<div class="register-link" style="text-align:center;margin-top:16px;font-size:13px;color:#666;">
  Don't have an account? <a href="register.html" style="color:#0F6E56;font-weight:600;text-decoration:none;">Register</a>
</div>
      
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
