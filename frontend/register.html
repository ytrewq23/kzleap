<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KZLEAP — Register</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .register-link { text-align: center; margin-top: 16px; font-size: 13px; color: #666; }
    .register-link a { color: #0F6E56; text-decoration: none; font-weight: 600; }
    .hidden { display: none; }
    .lang-switcher{display:flex;gap:4px;align-items:center;margin-right:8px;}
    .lang-btn{padding:3px 8px;font-size:11px;font-weight:600;border:1px solid #d0d7e2;border-radius:4px;background:#7b98b4;color:#4a5568;cursor:pointer;transition:all 0.15s;}
    .lang-btn:hover{background:#f0f4f8;color:#1a2b4a;}
    .lang-btn.active{background:#1a2b4a;color:#fff;border-color:#1a2b4a;}
  </style>
</head>
<body class="login-page">

  <div style="position:fixed;top:12px;right:16px;z-index:100;" class="lang-switcher">
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" data-lang="kk" onclick="setLang('kk')">KK</button>
  </div>

  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon">KZ</div>
      <h1 class="logo-title">KZLEAP</h1>
      <p class="logo-sub" data-i18n="login_platform_sub">Kazakhstan Energy Forecasting Platform</p>
    </div>

    <!-- Step 1: Registration form -->
    <div class="login-card" id="step-register">
      <h2 class="login-title" data-i18n="reg_title">Create Account</h2>
      <p class="login-sub" data-i18n="reg_sub">Fill in your details to get access</p>

      <div class="form-group">
        <label data-i18n="reg_firstname">First Name</label>
        <input type="text" id="firstname" data-i18n="reg_firstname_ph" data-i18n-attr="placeholder" placeholder="Your first name">
      </div>
      <div class="form-group">
        <label data-i18n="reg_lastname">Last Name</label>
        <input type="text" id="lastname" data-i18n="reg_lastname_ph" data-i18n-attr="placeholder" placeholder="Your last name">
      </div>
      <div class="form-group">
        <label data-i18n="login_email_label">Email</label>
        <input type="email" id="email" data-i18n="reg_email_ph" data-i18n-attr="placeholder" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label data-i18n="login_password_label">Password</label>
        <input type="password" id="password" data-i18n="reg_password_ph" data-i18n-attr="placeholder" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label data-i18n="reg_role">Role</label>
        <select id="role" onchange="toggleExtraFields()" style="width:100%;max-width:100%;box-sizing:border-box;overflow:hidden;text-overflow:ellipsis;">
          <option value="researcher" data-i18n="reg_role_researcher">Researcher — instant access</option>
          <option value="policymaker" data-i18n="reg_role_policymaker">Policymaker — email verification required</option>
          <option value="analyst" data-i18n="reg_role_analyst">Energy Analyst — email verification required</option>
        </select>
      </div>

      <div id="extra-fields" class="hidden">
        <div class="form-group">
          <label data-i18n="reg_workplace">Organization / Workplace</label>
          <input type="text" id="workplace" data-i18n="reg_workplace_ph" data-i18n-attr="placeholder" placeholder="e.g. KEGOC, Ministry of Energy">
        </div>
        <div class="form-group">
          <label data-i18n="reg_corp_email">Corporate Email</label>
          <input type="email" id="corporate_email" data-i18n="reg_corp_email_ph" data-i18n-attr="placeholder" placeholder="your@company.kz">
        </div>
      </div>

      <div id="error-msg" style="display:none;color:#c0392b;font-size:13px;margin-bottom:12px;"></div>
      <div id="success-msg" style="display:none;color:#0F6E56;font-size:13px;margin-bottom:12px;"></div>

      <button class="login-btn" onclick="handleRegister()" data-i18n="reg_btn">Create Account</button>
      

      <div class="register-link">
        <span data-i18n="reg_have_account">Already have an account?</span>
        <a href="index.html" data-i18n="login_title"> Sign in</a>
      </div>
    </div>

    <!-- Step 2: Email verification -->
    <div class="login-card hidden" id="step-verify">
      <h2 class="login-title" data-i18n="reg_verify_title">Verify Your Email</h2>
      <p class="login-sub" id="verify-subtitle" data-i18n="reg_verify_sub">Enter the 6-digit code sent to your corporate email</p>
      <div class="form-group">
        <label data-i18n="reg_verify_code_label">Verification Code</label>
        <input type="text" id="verify-code" placeholder="000000" maxlength="6"
               style="font-size:24px;text-align:center;letter-spacing:8px;">
      </div>
      <div id="verify-error" style="display:none;color:#c0392b;font-size:13px;margin-bottom:12px;"></div>
      <button class="login-btn" onclick="handleVerify()" data-i18n="reg_verify_btn">Verify & Sign In</button>
    </div>

  </div>

  <script>
    const BACKEND = 'http://localhost:8000';
    let userEmail = '';
    let corporateEmail = '';

    function toggleExtraFields() {
      const role = document.getElementById('role').value;
      const extra = document.getElementById('extra-fields');
      if (role === 'analyst' || role === 'policymaker') {
        extra.classList.remove('hidden');
      } else {
        extra.classList.add('hidden');
      }
    }

    async function handleRegister() {
      const firstname = document.getElementById('firstname').value.trim();
      const lastname  = document.getElementById('lastname').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value.trim();
      const role      = document.getElementById('role').value;
      const workplace       = document.getElementById('workplace')?.value.trim() || '';
      const corporate_email = document.getElementById('corporate_email')?.value.trim() || '';
      const errorMsg   = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');

      errorMsg.style.display   = 'none';
      successMsg.style.display = 'none';

      if (!firstname || !lastname || !email || !password) {
        errorMsg.textContent = typeof t === 'function' ? t('reg_err_fill_all') : 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
      if (!passwordRegex.test(password)) {
        errorMsg.textContent = typeof t === 'function' ? t('reg_err_password') : 'Password must be at least 8 characters, include one uppercase letter, one number, and one special character (!@#$%^&*).';
        errorMsg.style.display = 'block';
        return;
      }

      if ((role === 'analyst' || role === 'policymaker') && (!workplace || !corporate_email)) {
        errorMsg.textContent = typeof t === 'function' ? t('reg_err_workplace') : 'Please fill in workplace and corporate email.';
        errorMsg.style.display = 'block';
        return;
      }

      const blockedDomains = ['gmail.com', 'mail.ru', 'yandex.ru', 'yahoo.com', 'hotmail.com', 'outlook.com', 'icloud.com', 'bk.ru', 'list.ru', 'inbox.ru'];

if (role === 'analyst' || role === 'policymaker') {
  const corpDomain = corporate_email.split('@')[1]?.toLowerCase();
  if (!corpDomain || blockedDomains.includes(corpDomain)) {
    errorMsg.textContent = 'Please use a corporate or institutional email address (not Gmail, Mail.ru, etc.)';
    errorMsg.style.display = 'block';
    return;
  }
}

const name = `${firstname} ${lastname}`;
      userEmail      = email;
      corporateEmail = corporate_email;

      try {
        const res = await fetch(`${BACKEND}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role, workplace, corporate_email })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.detail || (typeof t === 'function' ? t('reg_err_failed') : 'Registration failed.');
          errorMsg.style.display = 'block';
          return;
        }

        if (data.message === 'code_sent') {
          document.getElementById('step-register').classList.add('hidden');
          document.getElementById('step-verify').classList.remove('hidden');
          document.getElementById('verify-subtitle').textContent =
            (typeof t === 'function' ? t('reg_verify_sent_to') : 'Enter the 6-digit code sent to') + ' ' + data.email;
        } else {
          successMsg.textContent = typeof t === 'function' ? t('reg_success') : '✓ Account created! Redirecting...';
          successMsg.style.display = 'block';
          setTimeout(() => window.location.href = 'index.html', 1500);
        }

      } catch {
        errorMsg.textContent = typeof t === 'function' ? t('reg_err_server') : 'Cannot connect to server.';
        errorMsg.style.display = 'block';
      }
    }

    async function handleVerify() {
      const code        = document.getElementById('verify-code').value.trim();
      const verifyError = document.getElementById('verify-error');
      verifyError.style.display = 'none';

      try {
        const res = await fetch(`${BACKEND}/api/verify-email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: corporateEmail, code, user_email: userEmail })
        });

        const data = await res.json();

        if (!res.ok) {
          verifyError.textContent = data.detail || (typeof t === 'function' ? t('reg_err_code') : 'Invalid code.');
          verifyError.style.display = 'block';
          return;
        }

        window.location.href = 'index.html';

      } catch {
        verifyError.textContent = typeof t === 'function' ? t('reg_err_server') : 'Cannot connect to server.';
        verifyError.style.display = 'block';
      }
    }
  </script>

  <script src="translations.js"></script>
  <script>document.addEventListener('DOMContentLoaded', applyTranslations);</script>
</body>
</html>
