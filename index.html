<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KZLEAP — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-logo">
      <div class="logo-circle">KZ</div>
      <h1>KZLEAP</h1>
      <p>Kazakhstan Energy Forecasting Platform</p>
    </div>

    <div class="login-card">
      <h2>Sign in</h2>
      <p class="login-sub">Choose your role and enter credentials</p>

      <div class="role-selector">
        <button class="role-btn active" onclick="selectRole('analyst', this)">
          Energy Analyst
        </button>
        <button class="role-btn" onclick="selectRole('researcher', this)">
          Researcher
        </button>
        <button class="role-btn" onclick="selectRole('policymaker', this)">
          Policymaker
        </button>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@kzleap.kz" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <div id="error-msg" class="error-msg" style="display:none;">
        Invalid email or password. Please try again.
      </div>

      <button class="login-btn" onclick="handleLogin()">Sign in</button>

      <div class="login-footer">
        <p>Demo accounts:</p>
        <p>ali@kzleap.kz · aliya@kzleap.kz · aizada@kzleap.kz</p>
        <p>Password: <strong>kzleap2026</strong></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
